<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="38" fill="url(#bgGrad)"/>

  <!-- Connection lines -->
  <line x1="100" y1="54" x2="54" y2="118" stroke="#0ea5e9" stroke-width="3" stroke-opacity="0.55"/>
  <line x1="100" y1="54" x2="146" y2="118" stroke="#0ea5e9" stroke-width="3" stroke-opacity="0.55"/>
  <line x1="54" y1="118" x2="100" y2="156" stroke="#10b981" stroke-width="3" stroke-opacity="0.55"/>
  <line x1="146" y1="118" x2="100" y2="156" stroke="#10b981" stroke-width="3" stroke-opacity="0.55"/>
  <line x1="54" y1="118" x2="146" y2="118" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Top node — primary cyan -->
  <circle cx="100" cy="54" r="22" fill="#0ea5e9" fill-opacity="0.15"/>
  <circle cx="100" cy="54" r="14" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="100" cy="54" r="6"  fill="#e0f2fe"/>

  <!-- Left node — blue -->
  <circle cx="54" cy="118" r="18" fill="#1d4ed8" fill-opacity="0.2"/>
  <circle cx="54" cy="118" r="11" fill="#3b82f6"/>
  <circle cx="54" cy="118" r="5"  fill="#bfdbfe"/>

  <!-- Right node — blue -->
  <circle cx="146" cy="118" r="18" fill="#1d4ed8" fill-opacity="0.2"/>
  <circle cx="146" cy="118" r="11" fill="#3b82f6"/>
  <circle cx="146" cy="118" r="5"  fill="#bfdbfe"/>

  <!-- Bottom node — green accent -->
  <circle cx="100" cy="156" r="18" fill="#064e3b" fill-opacity="0.3"/>
  <circle cx="100" cy="156" r="11" fill="#10b981" filter="url(#glow)"/>
  <circle cx="100" cy="156" r="5"  fill="#a7f3d0"/>
</svg>
